databases:
  - name: savanex-postgres
    engine: postgres
    majorVersion: "16"
    plan: free
    region: oregon

services:
  - type: web
    name: savanex-api
    env: python
    region: oregon
    plan: free
    rootDir: backend

    buildCommand: >-
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput

    startCommand: >-
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: SECRET_KEY
        generateValue: true

      - key: DB_ENGINE
        value: django.db.backends.postgresql

      - key: DB_NAME
        fromDatabase:
          name: savanex-postgres
          property: database

      - key: DB_USER
        fromDatabase:
          name: savanex-postgres
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: savanex-postgres
          property: password

      - key: DB_HOST
        fromDatabase:
          name: savanex-postgres
          property: host

      - key: DB_PORT
        fromDatabase:
          name: savanex-postgres
          property: port

      - key: ALLOWED_HOSTS
        value: savanex-api.onrender.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://savanex-web.onrender.com

      - key: SECURE_SSL_REDIRECT
        value: true

      - key: KCS_ORBIT_API_URL
        value: https://kcs-orbit-api.onrender.com

      - key: KCS_ORBIT_API_KEY
        sync: false

      - key: KCS_ORBIT_ORGANIZATION_ID
        sync: false

  - type: web
    name: savanex-web
    env: node
    region: oregon
    plan: free
    rootDir: frontend

    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT

    envVars:
      - key: VITE_API_URL
        fromService:
          name: savanex-api
          type: web
          property: url