version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: edupay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: edupay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    container_name: edupay-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
      - ai-service
    ports:
      - "4000:4000"

  web:
    build: ./apps/web
    container_name: edupay-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  ai-service:
    build: ./apps/ai-service
    container_name: edupay-ai
    restart: unless-stopped
    ports:
      - "8000:8000"

volumes:
  pgdata:
