databases:
  - name: edupay-postgres
    engine: postgres
    majorVersion: "16"
    plan: free
    region: oregon

services:
  # ============================
  # FRONTEND - React + Vite
  # ============================
  - type: web
    name: edupay-web
    env: node
    region: oregon
    plan: free

    buildCommand: >-
      corepack enable &&
      pnpm install &&
      pnpm --filter "@edupay/web" run build

    startCommand: npx serve -s apps/web/dist -l $PORT

    envVars:
      - key: NODE_ENV
        value: production

      - key: VITE_API_BASE_URL
        fromService:
          name: edupay-api
          type: web
          property: url

      - key: VITE_ENVIRONMENT
        value: production

  # ============================
  # API - Node.js + Express
  # ============================
  - type: web
    name: edupay-api
    env: node
    region: oregon
    plan: free

    buildCommand: >-
      corepack enable &&
      pnpm install &&
      pnpm --filter "@edupay/api" run prisma:generate &&
      pnpm --filter "@edupay/api" run build

    startCommand: >-
      cd apps/api &&
      npx prisma migrate deploy &&
      cd ../.. &&
      node apps/api/dist/server.js

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: edupay-postgres
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      - key: ENABLE_DEMO_AUTH_FALLBACK
        value: "false"

      - key: ENABLE_DEMO_DATA_FALLBACK
        value: "false"

      - key: FRONTEND_URL
        fromService:
          name: edupay-web
          type: web
          property: url
